<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Шапка лендинга Каштан</title>
    <style>
      :root {
        --header-bg: #030303;
        --header-fg: #ffffff;
        --header-muted: rgba(255, 255, 255, 0.72);
        --header-line: rgba(255, 255, 255, 0.16);
        --header-hover: rgba(255, 255, 255, 0.1);
      }

      @font-face {
        font-family: "Eterna Breaks";
        src: url("assets/fonts/EternaBreaks-Regular.ttf") format("truetype");
        font-display: swap;
        font-style: normal;
        font-weight: 400;
      }

      @font-face {
        font-family: "Philosopher";
        src: url("assets/fonts/Philosopher-Regular.ttf") format("truetype");
        font-display: swap;
        font-style: normal;
        font-weight: 400;
      }

      @font-face {
        font-family: "Circe";
        src: local("Circe"), local("Circe Regular");
        font-display: swap;
        font-style: normal;
        font-weight: 400;
      }

      * {
        box-sizing: border-box;
      }

      html {
        font-size: 16px;
      }

      body {
        min-height: 140vh;
        margin: 0;
        color: #1d1d1d;
        background: #f4f1ea;
        font-family: Arial, Helvetica, sans-serif;
      }

      .site-header {
        position: fixed;
        z-index: 50;
        top: 0;
        left: 0;
        right: 0;
        height: 64px;
        color: var(--header-fg);
        background: var(--header-bg);
        border-bottom: 1px solid var(--header-line);
        transition:
          background 180ms ease,
          border-color 180ms ease,
          backdrop-filter 180ms ease;
      }

      .site-header.is-scrolled {
        background: rgba(3, 3, 3, 0.6);
        border-color: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
      }

      .site-header__inner {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        align-items: center;
        gap: 10px;
        width: min(1180px, 100%);
        height: 100%;
        margin: 0 auto;
        padding: 0 clamp(14px, 4vw, 44px);
      }

      .brand {
        display: inline-flex;
        min-width: 0;
        align-items: center;
        gap: 9px;
        color: var(--header-fg);
        text-decoration: none;
      }

      .brand__logo {
        width: 36px;
        height: 36px;
        flex: 0 0 auto;
        object-fit: contain;
      }

      .brand__text {
        display: grid;
        min-width: 0;
        width: max-content;
        max-width: 100%;
      }

      .brand__name {
        min-width: 0;
        overflow: hidden;
        font-family: "Philosopher", Georgia, "Times New Roman", serif;
        font-size: clamp(25px, 6vw, 34px);
        font-weight: 400;
        line-height: 0.9;
        letter-spacing: 0;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .brand__tagline {
        display: flex;
        width: 100%;
        justify-content: space-between;
        margin-top: 3px;
        overflow: hidden;
        color: var(--header-muted);
        font-family: "Circe", Arial, Helvetica, sans-serif;
        font-size: clamp(8px, 2.2vw, 10px);
        font-weight: 400;
        line-height: 1;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .booking-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        padding: 0 15px;
        border: 1px solid var(--header-fg);
        border-radius: 0;
        color: #050505;
        background: var(--header-fg);
        font-size: 14px;
        font-weight: 700;
        line-height: 1;
        text-decoration: none;
        white-space: nowrap;
        transition:
          background 180ms ease,
          color 180ms ease,
          border-color 180ms ease,
          transform 180ms ease;
      }

      .booking-button:hover,
      .booking-button:focus-visible {
        border-color: var(--header-fg);
        color: var(--header-fg);
        background: transparent;
      }

      .booking-button:active {
        transform: translateY(1px);
      }

      .menu-toggle {
        display: inline-grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border: 1px solid var(--header-line);
        border-radius: 8px;
        color: var(--header-fg);
        background: transparent;
        cursor: pointer;
        transition:
          background 180ms ease,
          border-color 180ms ease;
      }

      .menu-toggle:hover,
      .menu-toggle:focus-visible {
        border-color: rgba(255, 255, 255, 0.5);
        background: var(--header-hover);
      }

      .menu-toggle__lines {
        position: relative;
        width: 18px;
        height: 12px;
      }

      .menu-toggle__lines::before,
      .menu-toggle__lines::after,
      .menu-toggle__lines span {
        position: absolute;
        left: 0;
        width: 18px;
        height: 2px;
        border-radius: 999px;
        background: currentColor;
        content: "";
        transform-origin: center;
        transition:
          top 180ms ease,
          bottom 180ms ease,
          opacity 140ms ease,
          transform 220ms ease;
      }

      .menu-toggle__lines::before {
        top: 0;
      }

      .menu-toggle__lines span {
        top: 5px;
      }

      .menu-toggle__lines::after {
        bottom: 0;
      }

      .menu-toggle.is-open .menu-toggle__lines::before {
        top: 5px;
        transform: rotate(45deg);
      }

      .menu-toggle.is-open .menu-toggle__lines span {
        opacity: 0;
        transform: scaleX(0);
      }

      .menu-toggle.is-open .menu-toggle__lines::after {
        bottom: 5px;
        transform: rotate(-45deg);
      }

      .header-menu {
        position: fixed;
        z-index: 49;
        top: 64px;
        left: 0;
        right: 0;
        display: none;
        gap: 4px;
        padding: 10px clamp(14px, 4vw, 44px) 14px;
        color: var(--header-fg);
        background: var(--header-bg);
        border-bottom: 1px solid var(--header-line);
        box-shadow: 0 18px 34px rgba(0, 0, 0, 0.28);
      }

      .header-menu.is-open {
        display: grid;
      }

      .header-menu a {
        width: min(1180px, 100%);
        margin: 0 auto;
        padding: 13px 0;
        color: var(--header-fg);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 17px;
        font-weight: 650;
        text-decoration: none;
      }

      .header-menu a:last-child {
        border-bottom: 0;
      }

      .prototype-stage {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 120px 18px 40px;
      }

      .prototype-note {
        max-width: 620px;
        margin: 0;
        color: #3f3f3f;
        font-size: 18px;
        line-height: 1.55;
        text-align: center;
      }

      @media (min-width: 760px) {
        .site-header {
          height: 72px;
        }

        .site-header__inner {
          gap: 16px;
        }

        .brand__logo {
          width: 42px;
          height: 42px;
        }

        .brand__name {
          font-size: 37px;
        }

        .brand__tagline {
          font-size: 10px;
        }

        .booking-button {
          min-height: 44px;
          padding: 0 22px;
          font-size: 15px;
        }

        .menu-toggle {
          width: 46px;
          height: 46px;
        }

        .header-menu {
          top: 72px;
        }
      }

      @media (max-width: 374px) {
        .site-header__inner {
          gap: 8px;
          padding-inline: 10px;
        }

        .brand {
          gap: 7px;
        }

        .brand__logo {
          width: 32px;
          height: 32px;
        }

        .brand__name {
          font-size: 22px;
        }

        .brand__tagline {
          margin-top: 2px;
          font-size: 7px;
        }

        .booking-button {
          min-height: 38px;
          padding: 0 11px;
          font-size: 13px;
        }

        .menu-toggle {
          width: 38px;
          height: 38px;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="brand" href="#" aria-label="Каштан">
          <img
            class="brand__logo"
            src="assets/kashtan_logo_white_only_exact.svg"
            alt=""
            aria-hidden="true"
          />
          <span class="brand__text" aria-hidden="true">
            <span class="brand__name">Каштан</span>
            <span class="brand__tagline">
              <span>гостиница</span>
              <span>|</span>
              <span>Судак</span>
            </span>
          </span>
        </a>

        <a class="booking-button" href="#" aria-label="Забронировать номер">Забронировать</a>

        <button
          class="menu-toggle"
          type="button"
          aria-label="Открыть меню"
          aria-controls="headerMenu"
          aria-expanded="false"
        >
          <span class="menu-toggle__lines" aria-hidden="true"><span></span></span>
        </button>
      </div>
    </header>

    <nav class="header-menu" id="headerMenu" aria-label="Меню шапки">
      <a href="#">Номера</a>
      <a href="#">Территория</a>
      <a href="#">Фото</a>
      <a href="#">Контакты</a>
    </nav>

    <main class="prototype-stage">
      <p class="prototype-note">
        Это отдельный макет шапки. Основной лендинг пока не изменён.
      </p>
    </main>

    <script>
      (() => {
        const header = document.querySelector(".site-header");
        const toggle = document.querySelector(".menu-toggle");
        const menu = document.querySelector("#headerMenu");

        if (!toggle || !menu) {
          return;
        }

        const setMenuState = (isOpen) => {
          menu.classList.toggle("is-open", isOpen);
          toggle.classList.toggle("is-open", isOpen);
          toggle.setAttribute("aria-expanded", String(isOpen));
          toggle.setAttribute("aria-label", isOpen ? "Закрыть меню" : "Открыть меню");
        };

        const updateHeaderOnScroll = () => {
          header?.classList.toggle("is-scrolled", window.scrollY > 8);
        };

        updateHeaderOnScroll();
        window.addEventListener("scroll", updateHeaderOnScroll, { passive: true });

        toggle.addEventListener("click", (event) => {
          event.stopPropagation();
          setMenuState(!menu.classList.contains("is-open"));
        });

        menu.addEventListener("click", (event) => {
          if (event.target.closest("a")) {
            setMenuState(false);
          }
        });

        document.addEventListener("click", (event) => {
          const isOpen = menu.classList.contains("is-open");
          const clickedInsideHeader = event.target.closest(".site-header");
          const clickedInsideMenu = event.target.closest("#headerMenu");

          if (isOpen && !clickedInsideHeader && !clickedInsideMenu) {
            setMenuState(false);
          }
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") {
            setMenuState(false);
          }
        });
      })();
    </script>
  </body>
</html>
